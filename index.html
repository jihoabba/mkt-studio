<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mkt-studio — Finder</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #ebebeb;
  --window-bg: #ffffff;
  --sidebar-bg: rgba(246,246,246,0.95);
  --titlebar: #e9e9e9;
  --titlebar-dark: #ddd;
  --text: #1d1d1f;
  --text-secondary: #595959;
  --text-muted: #8a8a8a;
  --accent: #007aff;
  --accent-bg: rgba(0,122,255,0.12);
  --selected-bg: #007aff;
  --selected-text: #ffffff;
  --divider: rgba(0,0,0,0.08);
  --divider-strong: rgba(0,0,0,0.14);
  --row-hover: rgba(0,0,0,0.04);
}
html, body {
  background: var(--bg);
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", sans-serif;
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  font-size: 13px;
  line-height: 1.4;
  height: 100vh;
  overflow: hidden;
}

.window {
  height: 100vh;
  background: var(--window-bg);
  display: grid;
  grid-template-rows: 44px 1fr 24px;
  overflow: hidden;
}

/* ── Title bar (traffic lights + title) ─────────── */
.titlebar {
  background: linear-gradient(to bottom, var(--titlebar), var(--titlebar-dark));
  border-bottom: 1px solid var(--divider-strong);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  position: relative;
  -webkit-user-select: none;
  user-select: none;
}
.traffic-lights {
  display: flex;
  gap: 8px;
}
.light {
  width: 12px; height: 12px;
  border-radius: 50%;
  border: 0.5px solid rgba(0,0,0,0.15);
}
.light.red { background: #ff5f57; }
.light.yellow { background: #febc2e; }
.light.green { background: #28c840; }
.toolbar-actions {
  display: flex;
  gap: 4px;
  margin-left: 16px;
}
.tb-btn {
  width: 28px; height: 24px;
  border: none;
  background: transparent;
  border-radius: 5px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-secondary);
  transition: background 0.1s;
}
.tb-btn:hover { background: rgba(0,0,0,0.06); }
.tb-btn:active { background: rgba(0,0,0,0.1); }
.tb-btn svg { width: 14px; height: 14px; }
.view-toggle {
  display: inline-flex;
  background: rgba(0,0,0,0.05);
  border-radius: 6px;
  padding: 2px;
  margin-left: 4px;
}
.view-toggle .tb-btn { width: 24px; height: 20px; border-radius: 4px; }
.view-toggle .tb-btn.active { background: white; color: var(--text); box-shadow: 0 0 0 0.5px rgba(0,0,0,0.1), 0 1px 2px rgba(0,0,0,0.05); }
.window-title {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  letter-spacing: -0.01em;
  pointer-events: none;
}
.title-icon { font-size: 12px; margin-right: 4px; }
.toolbar-spacer { flex: 1; }
.search-wrap {
  position: relative;
  width: 200px;
}
.search-input {
  width: 100%;
  height: 24px;
  padding: 0 8px 0 26px;
  border: 0.5px solid rgba(0,0,0,0.2);
  border-radius: 5px;
  background: rgba(255,255,255,0.8);
  font-family: inherit;
  font-size: 12px;
  color: var(--text);
  outline: none;
  transition: 0.1s;
}
.search-input:focus { background: white; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,122,255,0.2); }
.search-input::placeholder { color: var(--text-muted); }
.search-wrap svg {
  position: absolute;
  left: 8px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  width: 12px; height: 12px;
}

/* ── Body (sidebar + main) ─────────── */
.body {
  display: grid;
  grid-template-columns: 200px 1fr;
  overflow: hidden;
}
.sidebar {
  background: var(--sidebar-bg);
  border-right: 1px solid var(--divider-strong);
  overflow-y: auto;
  padding: 12px 0 12px 0;
  -webkit-user-select: none;
  user-select: none;
}
.sb-section {
  margin-bottom: 16px;
}
.sb-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  padding: 4px 14px;
}
.sb-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 10px 5px 14px;
  margin: 0 6px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  border-radius: 5px;
  cursor: pointer;
  transition: background 0.08s;
}
.sb-item:hover { background: rgba(0,0,0,0.05); }
.sb-item.active {
  background: var(--selected-bg);
  color: var(--selected-text);
}
.sb-icon {
  font-size: 14px;
  width: 18px;
  text-align: center;
  flex-shrink: 0;
}
.sb-label-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sb-count {
  font-size: 11px;
  color: var(--text-muted);
  font-variant-numeric: tabular-nums;
}
.sb-item.active .sb-count { color: rgba(255,255,255,0.85); }

/* ── Main content ─────────── */
.main {
  overflow-y: auto;
  background: white;
}

/* List view (default) */
.list-header {
  position: sticky;
  top: 0;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(10px);
  display: grid;
  grid-template-columns: minmax(280px, 2fr) 100px 90px 120px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-secondary);
  padding: 0;
  border-bottom: 1px solid var(--divider);
  z-index: 5;
}
.list-header > div {
  padding: 7px 12px;
  border-right: 1px solid var(--divider);
  cursor: pointer;
  user-select: none;
  letter-spacing: -0.01em;
}
.list-header > div:hover { background: rgba(0,0,0,0.03); }
.list-header > div.sorted { color: var(--text); }
.list-header > div:last-child { border-right: none; }

.list-row {
  display: grid;
  grid-template-columns: minmax(280px, 2fr) 100px 90px 120px;
  align-items: center;
  font-size: 12.5px;
  color: var(--text);
  cursor: pointer;
  text-decoration: none;
  border-bottom: 1px solid var(--divider);
}
.list-row:hover { background: var(--row-hover); }
.list-row.selected {
  background: var(--selected-bg);
  color: var(--selected-text);
}
.list-row > div {
  padding: 6px 12px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.list-row .name-cell {
  display: flex;
  align-items: center;
  gap: 8px;
}
.list-row .file-icon {
  font-size: 16px;
  flex-shrink: 0;
}
.list-row .name-title {
  font-weight: 500;
  letter-spacing: -0.005em;
}
.list-row .col-muted { color: var(--text-muted); font-size: 11.5px; }
.list-row.selected .col-muted { color: rgba(255,255,255,0.85); }

/* Icon (grid) view */
.icon-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 8px;
  padding: 20px;
}
.icon-tile {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 12px 8px;
  border-radius: 8px;
  cursor: pointer;
  text-decoration: none;
  color: inherit;
  text-align: center;
  transition: background 0.1s;
}
.icon-tile:hover { background: rgba(0,0,0,0.04); }
.icon-tile.selected { background: var(--selected-bg); color: var(--selected-text); }
.icon-tile-icon {
  font-size: 56px;
  line-height: 1;
  margin-bottom: 8px;
}
.icon-tile-name {
  font-size: 12px;
  font-weight: 500;
  line-height: 1.3;
  letter-spacing: -0.005em;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  word-break: keep-all;
}

/* Empty / placeholder */
.empty {
  padding: 80px 24px;
  text-align: center;
  color: var(--text-muted);
  font-size: 13px;
}
.empty strong {
  display: block;
  color: var(--text);
  font-size: 15px;
  margin-bottom: 6px;
}

/* ── Status bar ─────────── */
.statusbar {
  background: linear-gradient(to bottom, var(--titlebar), var(--titlebar-dark));
  border-top: 1px solid var(--divider-strong);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 16px;
  font-size: 11px;
  color: var(--text-secondary);
  letter-spacing: -0.01em;
  -webkit-user-select: none;
  user-select: none;
}

/* Detail pane (slide-in when selected) — optional ESC to close */
.detail-pane {
  position: fixed;
  top: 44px;
  right: 0;
  bottom: 24px;
  width: 320px;
  background: white;
  border-left: 1px solid var(--divider-strong);
  padding: 20px 24px;
  transform: translateX(100%);
  transition: transform 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
  overflow-y: auto;
  z-index: 20;
}
.detail-pane.open { transform: translateX(0); }
.detail-icon-big {
  font-size: 80px;
  text-align: center;
  margin-bottom: 16px;
}
.detail-title {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.015em;
  text-align: center;
  margin-bottom: 4px;
}
.detail-type {
  text-align: center;
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 600;
  margin-bottom: 20px;
}
.detail-section {
  border-top: 1px solid var(--divider);
  padding: 14px 0;
}
.detail-section h4 {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 8px;
}
.detail-row {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  padding: 3px 0;
}
.detail-row .k { color: var(--text-muted); }
.detail-row .v { color: var(--text); font-weight: 500; }
.detail-desc {
  font-size: 12.5px;
  color: var(--text-secondary);
  line-height: 1.55;
}
.detail-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}
.detail-tag {
  font-size: 10px;
  background: rgba(0,0,0,0.06);
  color: var(--text-secondary);
  padding: 2px 7px;
  border-radius: 4px;
  font-weight: 500;
}
.detail-open-btn {
  display: block;
  width: 100%;
  margin-top: 20px;
  padding: 10px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 6px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  text-decoration: none;
  text-align: center;
}
.detail-open-btn:hover { background: #0066d6; }
.detail-close {
  position: absolute;
  top: 10px; right: 12px;
  background: transparent;
  border: none;
  font-size: 18px;
  color: var(--text-muted);
  cursor: pointer;
  width: 24px; height: 24px;
  border-radius: 4px;
}
.detail-close:hover { background: rgba(0,0,0,0.06); color: var(--text); }

@media (max-width: 720px) {
  .body { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .window-title { font-size: 12px; }
  .detail-pane { width: 100%; }
  .search-wrap { width: 140px; }
  .list-header { grid-template-columns: 1fr 70px 80px; }
  .list-header > div:nth-child(3) { display: none; }
  .list-row { grid-template-columns: 1fr 70px 80px; }
  .list-row > div:nth-child(3) { display: none; }
}
</style>
</head>
<body>

<div class="window">

  <!-- Title bar -->
  <header class="titlebar">
    <div class="traffic-lights">
      <span class="light red"></span>
      <span class="light yellow"></span>
      <span class="light green"></span>
    </div>
    <div class="toolbar-actions">
      <button class="tb-btn" id="prevBtn" title="뒤로" disabled style="opacity:0.4">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="10,4 6,8 10,12"/></svg>
      </button>
      <button class="tb-btn" id="nextBtn" title="앞으로" disabled style="opacity:0.4">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6,4 10,8 6,12"/></svg>
      </button>
      <div class="view-toggle">
        <button class="tb-btn" id="viewIcon" title="아이콘 보기">
          <svg viewBox="0 0 16 16" fill="currentColor"><rect x="2" y="2" width="5" height="5" rx="1"/><rect x="9" y="2" width="5" height="5" rx="1"/><rect x="2" y="9" width="5" height="5" rx="1"/><rect x="9" y="9" width="5" height="5" rx="1"/></svg>
        </button>
        <button class="tb-btn active" id="viewList" title="리스트 보기">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="3" y1="4" x2="13" y2="4"/><line x1="3" y1="8" x2="13" y2="8"/><line x1="3" y1="12" x2="13" y2="12"/></svg>
        </button>
      </div>
    </div>
    <div class="window-title">
      <span class="title-icon">📁</span>
      <span>yeom's marketing work hub</span>
    </div>
    <div class="toolbar-spacer"></div>
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="20" y1="20" x2="16.65" y2="16.65"/></svg>
      <input type="text" class="search-input" id="searchInput" placeholder="검색">
    </div>
  </header>

  <!-- Body -->
  <div class="body">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main" id="main"></main>
  </div>

  <!-- Status bar -->
  <footer class="statusbar" id="statusbar">14개 항목</footer>

</div>

<!-- Detail pane (slides in when item selected) -->
<aside class="detail-pane" id="detailPane">
  <button class="detail-close" id="detailClose">×</button>
  <div id="detailContent"></div>
</aside>

<script>
const TYPE_META = {
  report:    { label:'리포트',     icon:'📊' },
  meeting:   { label:'회의록',     icon:'📋' },
  idea:      { label:'아이디어',   icon:'💡' },
  tool:      { label:'도구',       icon:'🛠' },
  prototype: { label:'프로토타입', icon:'🎮' },
  project:   { label:'프로젝트',   icon:'📁' },
};
const TYPE_ORDER = ['report','meeting','idea','tool','prototype','project'];

let allItems = [];
let activeType = 'all';
let searchText = '';
let viewMode = 'list';
let selectedId = null;
let sortKey = 'date';
let sortDesc = true;
let manifestMeta = null;

function el(tag, opts, ...children) {
  const node = document.createElement(tag);
  if (opts) {
    if (opts.cls) node.className = opts.cls;
    if (opts.text != null) node.textContent = String(opts.text);
    if (opts.style) node.setAttribute('style', opts.style);
    if (opts.attrs) for (const k of Object.keys(opts.attrs)) if (opts.attrs[k] != null) node.setAttribute(k, opts.attrs[k]);
    if (opts.on) for (const k of Object.keys(opts.on)) node.addEventListener(k, opts.on[k]);
  }
  for (const c of children) {
    if (c == null || c === false) continue;
    if (typeof c === 'string' || typeof c === 'number') node.appendChild(document.createTextNode(String(c)));
    else node.appendChild(c);
  }
  return node;
}
function clearNode(n){while(n.firstChild)n.removeChild(n.firstChild);}

async function loadManifest() {
  try {
    const res = await fetch('_meta/manifest.json?ts=' + Date.now());
    if (!res.ok) throw new Error('manifest 로드 실패');
    const data = await res.json();
    allItems = data.items || [];
    manifestMeta = data;
    renderSidebar();
    renderMain();
    updateStatusbar();
  } catch (e) {
    const main = document.getElementById('main');
    clearNode(main);
    const empty = el('div', { cls: 'empty' });
    empty.appendChild(el('strong', { text: '매니페스트 로드 실패' }));
    empty.appendChild(document.createTextNode('scripts/build-manifest.py 를 실행한 후 다시 시도하세요.'));
    main.appendChild(empty);
  }
}

function renderSidebar() {
  const sb = document.getElementById('sidebar');
  clearNode(sb);

  const byType = {};
  allItems.forEach(i => { byType[i.type] = (byType[i.type] || 0) + 1; });

  // FAVORITES
  const fav = el('div', { cls: 'sb-section' });
  fav.appendChild(el('div', { cls: 'sb-label', text: '즐겨찾기' }));
  const recents = allItems.slice().sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0, 3);
  recents.forEach(item => {
    const meta = TYPE_META[item.type] || { label:item.type, icon:'📄' };
    const it = el('div', { cls: 'sb-item' });
    it.appendChild(el('span', { cls: 'sb-icon', text: meta.icon }));
    it.appendChild(el('span', { cls: 'sb-label-text', text: item.title || item.id }));
    it.addEventListener('click', () => {
      selectItem(item);
    });
    fav.appendChild(it);
  });
  sb.appendChild(fav);

  // TAGS / Categories
  const cats = el('div', { cls: 'sb-section' });
  cats.appendChild(el('div', { cls: 'sb-label', text: '태그' }));

  const allItem = el('div', { cls: 'sb-item' + (activeType==='all' ? ' active' : '') });
  allItem.appendChild(el('span', { cls: 'sb-icon', text: '📂' }));
  allItem.appendChild(el('span', { cls: 'sb-label-text', text: '전체' }));
  allItem.appendChild(el('span', { cls: 'sb-count', text: String(allItems.length) }));
  allItem.addEventListener('click', () => { activeType = 'all'; renderSidebar(); renderMain(); updateStatusbar(); });
  cats.appendChild(allItem);

  TYPE_ORDER.forEach(t => {
    if (!byType[t]) return;
    const meta = TYPE_META[t];
    const it = el('div', { cls: 'sb-item' + (activeType===t ? ' active' : '') });
    it.appendChild(el('span', { cls: 'sb-icon', text: meta.icon }));
    it.appendChild(el('span', { cls: 'sb-label-text', text: meta.label }));
    it.appendChild(el('span', { cls: 'sb-count', text: String(byType[t]) }));
    it.addEventListener('click', () => { activeType = t; renderSidebar(); renderMain(); updateStatusbar(); });
    cats.appendChild(it);
  });
  sb.appendChild(cats);
}

function getFiltered() {
  let rows = allItems.filter(item => {
    if (activeType !== 'all' && item.type !== activeType) return false;
    if (searchText) {
      const q = searchText.toLowerCase();
      const hay = [item.title, item.desc, (item.tags || []).join(' '), item.id].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
  rows.sort((a, b) => {
    let av = a[sortKey] || '', bv = b[sortKey] || '';
    if (sortKey === 'type') {
      av = TYPE_META[av]?.label || av;
      bv = TYPE_META[bv]?.label || bv;
    }
    if (av < bv) return sortDesc ? 1 : -1;
    if (av > bv) return sortDesc ? -1 : 1;
    return 0;
  });
  return rows;
}

function renderMain() {
  const main = document.getElementById('main');
  clearNode(main);
  const rows = getFiltered();
  if (rows.length === 0) {
    const empty = el('div', { cls: 'empty' });
    empty.appendChild(el('strong', { text: '항목 없음' }));
    empty.appendChild(document.createTextNode('필터·검색 조건을 바꿔보세요.'));
    main.appendChild(empty);
    return;
  }
  if (viewMode === 'icon') renderIconView(main, rows);
  else renderListView(main, rows);
}

function renderListView(main, rows) {
  // Header
  const header = el('div', { cls: 'list-header' });
  const cols = [
    { k: 'title', label: '이름' },
    { k: 'date', label: '수정일' },
    { k: 'type', label: '종류' },
    { k: 'id', label: 'ID' },
  ];
  cols.forEach(c => {
    const div = el('div', {
      cls: sortKey === c.k ? 'sorted' : '',
      on: { click: () => {
        if (sortKey === c.k) sortDesc = !sortDesc;
        else { sortKey = c.k; sortDesc = c.k === 'date'; }
        renderMain();
      }}
    });
    div.appendChild(document.createTextNode(c.label));
    if (sortKey === c.k) {
      div.appendChild(document.createTextNode('  ' + (sortDesc ? '↓' : '↑')));
    }
    header.appendChild(div);
  });
  main.appendChild(header);

  rows.forEach(item => {
    const meta = TYPE_META[item.type] || { label: item.type, icon: '📄' };
    const row = el('a', {
      cls: 'list-row' + (selectedId === item.id ? ' selected' : ''),
      attrs: { href: item.file || '#', target: '_blank', rel: 'noopener' },
      on: {
        click: (e) => {
          // 단일 클릭: 선택 + 디테일 보여주기, 더블 클릭: 새 탭 열기
          if (e.detail === 1) {
            e.preventDefault();
            selectItem(item);
          }
        }
      }
    });
    const nameCell = el('div', { cls: 'name-cell' });
    nameCell.appendChild(el('span', { cls: 'file-icon', text: meta.icon }));
    nameCell.appendChild(el('span', { cls: 'name-title', text: item.title || item.id || '제목 없음' }));
    row.appendChild(nameCell);
    row.appendChild(el('div', { cls: 'col-muted', text: item.date || '—' }));
    row.appendChild(el('div', { cls: 'col-muted', text: meta.label }));
    row.appendChild(el('div', { cls: 'col-muted', text: item.id || '—' }));
    main.appendChild(row);
  });
}

function renderIconView(main, rows) {
  const grid = el('div', { cls: 'icon-grid' });
  rows.forEach(item => {
    const meta = TYPE_META[item.type] || { label: item.type, icon: '📄' };
    const tile = el('a', {
      cls: 'icon-tile' + (selectedId === item.id ? ' selected' : ''),
      attrs: { href: item.file || '#', target: '_blank', rel: 'noopener' },
      on: {
        click: (e) => {
          if (e.detail === 1) {
            e.preventDefault();
            selectItem(item);
          }
        }
      }
    });
    tile.appendChild(el('div', { cls: 'icon-tile-icon', text: meta.icon }));
    tile.appendChild(el('div', { cls: 'icon-tile-name', text: item.title || item.id || '제목 없음' }));
    grid.appendChild(tile);
  });
  main.appendChild(grid);
}

function selectItem(item) {
  selectedId = item.id;
  renderMain();
  renderDetail(item);
  updateStatusbar();
}

function renderDetail(item) {
  const pane = document.getElementById('detailPane');
  const content = document.getElementById('detailContent');
  clearNode(content);

  const meta = TYPE_META[item.type] || { label: item.type, icon: '📄' };

  content.appendChild(el('div', { cls: 'detail-icon-big', text: meta.icon }));
  content.appendChild(el('div', { cls: 'detail-title', text: item.title || item.id || '제목 없음' }));
  content.appendChild(el('div', { cls: 'detail-type', text: meta.label }));

  // 일반 정보
  const info = el('div', { cls: 'detail-section' });
  info.appendChild(el('h4', { text: '정보' }));
  const rows = [
    { k: '종류', v: meta.label },
    { k: '수정일', v: item.date || '—' },
    { k: 'ID', v: item.id || '—' },
    { k: '경로', v: item.file || '—' },
  ];
  rows.forEach(r => {
    const row = el('div', { cls: 'detail-row' });
    row.appendChild(el('span', { cls: 'k', text: r.k }));
    row.appendChild(el('span', { cls: 'v', text: r.v, style: 'max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;' }));
    info.appendChild(row);
  });
  content.appendChild(info);

  // 설명
  if (item.desc) {
    const desc = el('div', { cls: 'detail-section' });
    desc.appendChild(el('h4', { text: '설명' }));
    desc.appendChild(el('div', { cls: 'detail-desc', text: item.desc }));
    content.appendChild(desc);
  }

  // 태그
  if (item.tags && item.tags.length) {
    const tagSec = el('div', { cls: 'detail-section' });
    tagSec.appendChild(el('h4', { text: '태그' }));
    const tagWrap = el('div', { cls: 'detail-tags' });
    item.tags.forEach(t => tagWrap.appendChild(el('span', { cls: 'detail-tag', text: t })));
    tagSec.appendChild(tagWrap);
    content.appendChild(tagSec);
  }

  // 열기 버튼
  if (item.file) {
    const btn = el('a', {
      cls: 'detail-open-btn',
      attrs: { href: item.file, target: '_blank', rel: 'noopener' },
      text: '열기 ↗',
    });
    content.appendChild(btn);
  }

  pane.classList.add('open');
}

document.getElementById('detailClose').addEventListener('click', () => {
  document.getElementById('detailPane').classList.remove('open');
  selectedId = null;
  renderMain();
  updateStatusbar();
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    document.getElementById('detailPane').classList.remove('open');
    selectedId = null;
    renderMain();
    updateStatusbar();
  }
});

function updateStatusbar() {
  const rows = getFiltered();
  const sb = document.getElementById('statusbar');
  const sel = selectedId ? '  ·  1개 선택됨' : '';
  const updated = manifestMeta?.generated_at ? '  ·  업데이트 ' + manifestMeta.generated_at.slice(0,10) : '';
  sb.textContent = rows.length + '개 항목' + sel + updated;
}

document.getElementById('viewIcon').addEventListener('click', () => {
  viewMode = 'icon';
  document.getElementById('viewIcon').classList.add('active');
  document.getElementById('viewList').classList.remove('active');
  renderMain();
});
document.getElementById('viewList').addEventListener('click', () => {
  viewMode = 'list';
  document.getElementById('viewList').classList.add('active');
  document.getElementById('viewIcon').classList.remove('active');
  renderMain();
});

document.getElementById('searchInput').addEventListener('input', (e) => {
  searchText = e.target.value.trim();
  renderMain();
  updateStatusbar();
});

loadManifest();
</script>

</body>
</html>
