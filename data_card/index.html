<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly MKT Report — Card Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f5f7;
  --surface: #ffffff;
  --text: #1d1d1f;
  --muted: rgba(0,0,0,0.45);
  --subtle: rgba(0,0,0,0.06);
  --divider: rgba(0,0,0,0.08);
  --accent: #0071e3;
  --up: #1a7f4b;
  --down: #c0392b;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
}
html, body {
  background: var(--bg);
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", "Apple SD Gothic Neo", sans-serif;
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
}

.topbar {
  height: 56px;
  background: rgba(245,245,247,0.9);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--divider);
  position: sticky;
  top: 0; z-index: 100;
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 16px;
}
.brand { font-weight: 700; font-size: 15px; letter-spacing: -0.01em; }
.brand-sub { font-size: 12px; color: var(--muted); font-weight: 500; }
.spacer { flex: 1; }
.btn {
  height: 36px;
  padding: 0 16px;
  border-radius: 8px;
  border: 1px solid var(--divider);
  background: var(--surface);
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  cursor: pointer;
  transition: 0.15s;
}
.btn:hover { background: var(--subtle); }
.btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
.btn.primary:hover { background: #0058b8; }
.btn.ghost { background: transparent; }

.layout {
  display: grid;
  grid-template-columns: 380px 1fr;
  min-height: calc(100vh - 56px);
}
.panel-left {
  border-right: 1px solid var(--divider);
  background: var(--surface);
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  position: sticky;
  top: 56px;
  height: calc(100vh - 56px);
  overflow-y: auto;
}
.label { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
.field-group { display: flex; flex-direction: column; gap: 6px; }
.input, textarea {
  font-family: inherit;
  font-size: 13px;
  padding: 10px 12px;
  border: 1px solid var(--divider);
  border-radius: 8px;
  background: var(--bg);
  color: var(--text);
  resize: none;
}
textarea { min-height: 320px; line-height: 1.5; flex: 1; }
.input:focus, textarea:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
.row { display: flex; gap: 8px; }
.row > * { flex: 1; }
.help {
  font-size: 11px;
  color: var(--muted);
  line-height: 1.5;
  padding: 10px 12px;
  background: var(--subtle);
  border-radius: 8px;
}

.panel-right {
  padding: 32px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 32px;
}
.cards-stack { display: flex; flex-direction: column; gap: 32px; align-items: center; width: 100%; }
.card-wrap { display: flex; flex-direction: column; gap: 10px; align-items: center; }
.card-meta-row { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); }
.card-num { font-weight: 700; color: var(--text); }

/* CARD 9:16 (540x960) */
.card {
  width: 540px;
  height: 960px;
  background: var(--surface);
  border-radius: 20px;
  box-shadow: var(--shadow);
  overflow: hidden;
  position: relative;
  display: flex;
  flex-direction: column;
  padding: 60px 56px 50px;
  color: var(--text);
}
.card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 28px;
}
.card-tag { font-size: 11px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); }
.card-date { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 0.04em; }
.card-section-label { font-size: 13px; font-weight: 700; letter-spacing: 0.04em; color: var(--accent); margin-bottom: 6px; }
.card-section-title { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 32px; }
.card-body { flex: 1; display: flex; flex-direction: column; }
.card-footer {
  position: absolute;
  bottom: 28px; left: 56px; right: 56px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
  color: var(--muted);
  font-weight: 600;
  letter-spacing: 0.04em;
}

/* Cover */
.cover-emblem {
  width: 56px; height: 56px;
  background: var(--text);
  color: white;
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 22px; letter-spacing: -0.02em;
  margin-bottom: 24px;
}
.cover-title { font-size: 38px; font-weight: 800; letter-spacing: -0.03em; line-height: 1.05; margin-bottom: 12px; }
.cover-period { font-size: 16px; color: var(--muted); font-weight: 500; margin-bottom: auto; }
.cover-divider { width: 48px; height: 3px; background: var(--text); margin-bottom: 20px; }
.cover-insight { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.4; margin-bottom: 16px; }

/* Metric */
.metric-wrap { flex: 1; display: flex; flex-direction: column; justify-content: center; }
.metric-number { font-size: 76px; font-weight: 800; letter-spacing: -0.04em; line-height: 1; font-feature-settings: "tnum" 1; margin-bottom: 8px; }
.metric-unit { font-size: 18px; color: var(--muted); font-weight: 600; margin-bottom: 28px; }
.metric-spacer { height: 28px; }
.metric-trend {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 22px;
  font-weight: 700;
  padding: 6px 14px;
  border-radius: 100px;
  margin-bottom: 12px;
  align-self: flex-start;
}
.metric-trend.up { background: rgba(26,127,75,0.1); color: var(--up); }
.metric-trend.down { background: rgba(192,57,43,0.1); color: var(--down); }
.metric-trend.flat { background: var(--subtle); color: var(--muted); }
.metric-trend-label { font-size: 13px; color: var(--muted); font-weight: 600; margin-bottom: 36px; }
.metric-context { padding-top: 20px; border-top: 1px solid var(--divider); font-size: 14px; color: var(--muted); font-weight: 500; }

/* Ranking */
.rank-list { display: flex; flex-direction: column; gap: 22px; flex: 1; justify-content: center; }
.rank-item { display: flex; flex-direction: column; gap: 8px; }
.rank-row { display: flex; align-items: baseline; gap: 12px; }
.rank-num { font-size: 14px; font-weight: 800; color: var(--muted); width: 18px; }
.rank-name { flex: 1; font-size: 20px; font-weight: 700; letter-spacing: -0.01em; }
.rank-pct { font-size: 22px; font-weight: 800; color: var(--text); font-feature-settings: "tnum" 1; }
.rank-bar { height: 8px; background: var(--subtle); border-radius: 100px; overflow: hidden; margin-left: 30px; }
.rank-fill { height: 100%; background: var(--text); border-radius: 100px; }
.rank-item:nth-child(1) .rank-fill { background: var(--text); }
.rank-item:nth-child(2) .rank-fill { background: rgba(0,0,0,0.55); }
.rank-item:nth-child(3) .rank-fill { background: rgba(0,0,0,0.35); }

/* Summary / Notes */
.list-items { display: flex; flex-direction: column; gap: 22px; }
.list-item { display: flex; flex-direction: column; gap: 4px; }
.list-item-label { font-size: 13px; font-weight: 800; color: var(--accent); letter-spacing: 0.02em; }
.list-item-body { font-size: 16px; font-weight: 500; line-height: 1.5; color: var(--text); letter-spacing: -0.005em; }
.notes-group { display: flex; flex-direction: column; gap: 20px; }
.notes-item { display: flex; flex-direction: column; gap: 4px; }
.notes-label { font-size: 13px; font-weight: 800; letter-spacing: 0.02em; color: var(--accent); }
.notes-body { font-size: 14px; line-height: 1.55; color: var(--text); }
.notes-body.sub { color: var(--muted); }

.empty {
  width: 100%;
  max-width: 540px;
  padding: 48px;
  background: var(--surface);
  border: 1px dashed var(--divider);
  border-radius: 16px;
  text-align: center;
  color: var(--muted);
  font-size: 14px;
}
.empty strong { display: block; font-size: 16px; color: var(--text); margin-bottom: 6px; }

.brand-mark { font-size: 11px; font-weight: 700; letter-spacing: 0.16em; color: var(--muted); }

@media (max-width: 980px) {
  .layout { grid-template-columns: 1fr; }
  .panel-left { position: static; height: auto; border-right: none; border-bottom: 1px solid var(--divider); }
}
</style>
</head>
<body>

<header class="topbar">
  <div>
    <div class="brand">WEEKLY MKT REPORT — Card Generator</div>
    <div class="brand-sub">텍스트 붙여넣으면 9:16 카드뉴스로 변환</div>
  </div>
  <div class="spacer"></div>
  <button class="btn ghost" id="loadSample">샘플 불러오기</button>
  <button class="btn primary" id="downloadAll">모든 카드 다운로드</button>
</header>

<div class="layout">

  <aside class="panel-left">
    <div class="field-group">
      <span class="label">주차 / 발행일</span>
      <div class="row">
        <input type="date" class="input" id="reportDate">
        <input type="text" class="input" id="reportWeek" placeholder="WEEK 20">
      </div>
    </div>

    <div class="field-group" style="flex:1; display:flex;">
      <span class="label">원본 텍스트 (Weekly MKT Report)</span>
      <textarea id="rawInput" placeholder="[WEEKLY MKT REPORT] 형태로 붙여넣으세요"></textarea>
    </div>

    <button class="btn primary" id="generate">카드 생성</button>

    <div class="help">
      💡 팁: '모든 카드 다운로드'는 PNG 파일을 순차적으로 받아옵니다. 라인 단체방에는 받은 PNG들 묶어서 한번에 전송하세요.
    </div>
  </aside>

  <main class="panel-right">
    <div class="cards-stack" id="cardsStack"></div>
  </main>

</div>

<script>
/* ============================================
   Safe DOM helpers
   ============================================ */
function el(tag, opts, ...children) {
  const node = document.createElement(tag);
  if (opts) {
    if (opts.cls) node.className = opts.cls;
    if (opts.text != null) node.textContent = String(opts.text);
    if (opts.style) node.setAttribute('style', opts.style);
    if (opts.attrs) {
      for (const k of Object.keys(opts.attrs)) {
        if (opts.attrs[k] != null) node.setAttribute(k, opts.attrs[k]);
      }
    }
    if (opts.on) {
      for (const k of Object.keys(opts.on)) node.addEventListener(k, opts.on[k]);
    }
  }
  for (const c of children) {
    if (c == null || c === false) continue;
    if (typeof c === 'string' || typeof c === 'number') {
      node.appendChild(document.createTextNode(String(c)));
    } else {
      node.appendChild(c);
    }
  }
  return node;
}
function clearNode(node) {
  while (node.firstChild) node.removeChild(node.firstChild);
}

/* ============================================
   Sample
   ============================================ */
const SAMPLE = `[WEEKLY MKT REPORT]
[주요 지표]
- UV: 41,263명 (전주 比 +1.58%) / MTD 8.9만
- Sales: ₩75.7M (전주 比 +97.13%) / MTD 1.2억 원
- Top IP: Genshin (33.7%), ZO&FRIENDS (31.7%), BT21 (15.8%)
- UV Top 국가: 한국 (48%), 일본 (7.2%), 미국 (6.9%)

[요약]
- 매출: 유입(+1.58%)은 전주 수준이나 신규 라인업 효과로 매출 97.13% 증가
- IP 재편: '원신(Genshin) 미니니' 금요일 출시 직후 매출 점유율 1위 등극
- 효율 개선: CVR 4.0%로 소폭 개선 및 객단가(ATV) ₩76.8K로 상승하여 수익성 개선

[마케팅 특이사항]
- 세일즈 모멘텀:
  원신 팝업 한정 수량으로 조기 품절 SKU(충전기, 캔뱃지, 인형 일부 등) 다수 발생
  ZO&FRIENDS 무드등 단품 매출 1.6천만 원으로 단일 품목 가장 높은 매출 기여
- 마켓 과제: 일본 시장은 유입 2위 유지 중이나 매출 전환 미비로 지속적인 최적화 필요
- 채널 효율 (IP별 최적 매체 확인):
   Genshin (X 중심): 팝업 런칭 콘텐츠 노출 115.4K, 인게이지 1.7%로 X 채널 화력 집중
   ZO&FRIENDS (IG 중심): IG 노출 72.7K, 인게이지 5.3% 기록 (X는 1.3만 뷰로 저조)
  삐돌이 (바이럴): 아기 카피바라 숏폼 인게이지 6.9% 달성하며 유저 자발적 공유 확인`;

/* ============================================
   Parser
   ============================================ */
function parseReport(text) {
  const data = { uv: null, sales: null, topIPs: [], topCountries: [], summary: [], notes: [] };
  const sectionMap = {};
  const lines = text.split('\n');
  let currentSection = null;
  for (const line of lines) {
    const sectionMatch = line.match(/^\s*\[([^\]]+)\]\s*$/);
    if (sectionMatch) {
      currentSection = sectionMatch[1].trim();
      sectionMap[currentSection] = [];
      continue;
    }
    if (currentSection) sectionMap[currentSection].push(line);
  }

  const metricsLines = (sectionMap['주요 지표'] || []).join('\n');
  data.uv = parseMetric(metricsLines, 'UV');
  data.sales = parseMetric(metricsLines, 'Sales');
  data.topIPs = parseTopList(metricsLines, 'Top IP');
  data.topCountries = parseTopList(metricsLines, 'UV Top 국가');

  data.summary = parseBulletList(sectionMap['요약'] || []);
  data.notes = parseNotesGroup(sectionMap['마케팅 특이사항'] || []);

  return data;
}

function parseMetric(text, key) {
  const re = new RegExp('-?\\s*' + key + '\\s*:\\s*(.+)', 'i');
  const m = text.match(re);
  if (!m) return null;
  const line = m[1].trim();

  let mainPart = line.split(/[\(\/]/)[0].trim();
  let unit = '';
  if (mainPart.endsWith('명')) { unit = '명'; mainPart = mainPart.slice(0, -1).trim(); }
  else if (mainPart.endsWith('원')) { unit = '원'; mainPart = mainPart.slice(0, -1).trim(); }

  let woWPct = null, woWDir = null;
  const woWMatch = line.match(/전주\s*比\s*([+\-])?([\d.]+)%/);
  if (woWMatch) { woWDir = woWMatch[1] || '+'; woWPct = parseFloat(woWMatch[2]); }

  let mtd = null;
  const mtdMatch = line.match(/MTD\s+([^()\n\/]+?)(?:\s*\(|$)/);
  if (mtdMatch) mtd = 'MTD ' + mtdMatch[1].trim();
  let mtdSub = null;
  const mtdPctMatch = line.match(/MTD[^()]*\(([^)]+)\)/);
  if (mtdPctMatch) mtdSub = mtdPctMatch[1].trim();

  return { mainNumber: mainPart, unit, woWDir, woWPct, mtd, mtdSub, raw: line };
}

function parseTopList(text, key) {
  const re = new RegExp('-?\\s*' + escapeRegex(key) + '\\s*:\\s*(.+)', 'i');
  const m = text.match(re);
  if (!m) return [];
  const items = m[1].split(',').map(s => s.trim()).filter(Boolean);
  return items.map(s => {
    const pctMatch = s.match(/\(([\d.]+)%\)/);
    const name = s.replace(/\s*\([^)]+\)\s*/, '').trim();
    return { name, pct: pctMatch ? parseFloat(pctMatch[1]) : null };
  }).filter(x => x.name);
}

function parseBulletList(rawLines) {
  const items = [];
  let current = null;
  for (const rawLine of rawLines) {
    const trimmed = rawLine.replace(/^\s+/, '');
    if (/^[-•]\s+/.test(trimmed)) {
      if (current) items.push(current);
      const content = trimmed.replace(/^[-•]\s+/, '');
      const colonIdx = content.indexOf(':');
      if (colonIdx > 0 && colonIdx < 20) {
        current = { label: content.slice(0, colonIdx).trim(), body: content.slice(colonIdx + 1).trim() };
      } else {
        current = { label: '', body: content };
      }
    } else if (trimmed && current) {
      current.body = (current.body + ' ' + trimmed).trim();
    }
  }
  if (current) items.push(current);
  return items;
}

function parseNotesGroup(rawLines) {
  const groups = [];
  let current = null;
  for (const rawLine of rawLines) {
    const m = rawLine.match(/^\s*[-•]\s+(.+)/);
    if (m) {
      if (current) groups.push(current);
      const content = m[1].trim();
      const colonIdx = content.indexOf(':');
      if (colonIdx > 0) {
        const label = content.slice(0, colonIdx).replace(/\s*\([^)]+\)\s*/, '').trim();
        const inline = content.slice(colonIdx + 1).trim();
        current = { label, body: inline ? [inline] : [] };
      } else {
        current = { label: content, body: [] };
      }
    } else {
      const trimmed = rawLine.trim();
      if (trimmed && current) current.body.push(trimmed);
    }
  }
  if (current) groups.push(current);
  return groups;
}

function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

/* ============================================
   Card builders (DOM-only)
   ============================================ */
function makeHeader(meta, tag) {
  return el('div', { cls: 'card-header' },
    el('span', { cls: 'card-tag', text: tag || 'WEEKLY MKT REPORT' }),
    el('span', { cls: 'card-date', text: meta.dateDisplay || '' })
  );
}

function makeFooter() {
  return el('div', { cls: 'card-footer' }); // filled in later with page count
}

function coverCard(meta, insight) {
  const card = el('div', { cls: 'card' });
  card.appendChild(makeHeader(meta, meta.week || 'WEEKLY'));

  const body = el('div', { cls: 'card-body', style: 'justify-content:flex-start;' });
  body.appendChild(el('div', { cls: 'cover-emblem', text: 'W' }));

  const title = el('div', { cls: 'cover-title' });
  title.appendChild(document.createTextNode('주간 마케팅'));
  title.appendChild(el('br'));
  title.appendChild(document.createTextNode('리포트'));
  body.appendChild(title);

  const period = (meta.dateDisplay || '') + (meta.week ? ' · ' + meta.week : '');
  body.appendChild(el('div', { cls: 'cover-period', text: period }));
  body.appendChild(el('div', { cls: 'cover-divider' }));
  body.appendChild(el('div', { cls: 'cover-insight', text: insight }));

  card.appendChild(body);
  card.appendChild(makeFooter());
  return card;
}

function metricCard(tag, title, metric, meta) {
  const card = el('div', { cls: 'card' });
  card.appendChild(makeHeader(meta, tag));
  card.appendChild(el('div', { cls: 'card-section-label', text: tag.toUpperCase() }));
  card.appendChild(el('div', { cls: 'card-section-title', text: title }));

  const body = el('div', { cls: 'card-body metric-wrap' });
  body.appendChild(el('div', { cls: 'metric-number', text: metric.mainNumber }));
  if (metric.unit) {
    body.appendChild(el('div', { cls: 'metric-unit', text: metric.unit }));
  } else {
    body.appendChild(el('div', { cls: 'metric-spacer' }));
  }

  const trendCls = metric.woWPct == null ? 'flat' : (metric.woWDir === '-' ? 'down' : 'up');
  const trendArrow = metric.woWPct == null ? '·' : (metric.woWDir === '-' ? '↓' : '↑');
  const trendPct = metric.woWPct != null
    ? ((metric.woWDir === '-' ? '-' : '+') + metric.woWPct + '%')
    : '—';
  body.appendChild(el('div', { cls: 'metric-trend ' + trendCls, text: trendArrow + ' ' + trendPct }));
  body.appendChild(el('div', { cls: 'metric-trend-label', text: '전주 대비' }));

  const contextText = [metric.mtd, metric.mtdSub ? '(' + metric.mtdSub + ')' : null].filter(Boolean).join(' ');
  if (contextText) body.appendChild(el('div', { cls: 'metric-context', text: contextText }));

  card.appendChild(body);
  card.appendChild(makeFooter());
  return card;
}

function rankCard(tag, title, items, meta) {
  const card = el('div', { cls: 'card' });
  card.appendChild(makeHeader(meta, tag));
  card.appendChild(el('div', { cls: 'card-section-label', text: tag.toUpperCase() }));
  card.appendChild(el('div', { cls: 'card-section-title', text: title }));

  const body = el('div', { cls: 'card-body' });
  const list = el('div', { cls: 'rank-list' });
  const max = Math.max(...items.map(i => i.pct || 0), 1);
  items.slice(0, 5).forEach((item, i) => {
    const itemEl = el('div', { cls: 'rank-item' });
    const row = el('div', { cls: 'rank-row' });
    row.appendChild(el('span', { cls: 'rank-num', text: String(i + 1) }));
    row.appendChild(el('span', { cls: 'rank-name', text: item.name }));
    row.appendChild(el('span', { cls: 'rank-pct', text: item.pct != null ? item.pct + '%' : '' }));
    itemEl.appendChild(row);

    const fillWidth = item.pct != null ? (item.pct / max * 100) : 0;
    const bar = el('div', { cls: 'rank-bar' });
    bar.appendChild(el('div', { cls: 'rank-fill', style: 'width:' + fillWidth + '%;' }));
    itemEl.appendChild(bar);

    list.appendChild(itemEl);
  });
  body.appendChild(list);
  card.appendChild(body);
  card.appendChild(makeFooter());
  return card;
}

function summaryCard(tag, title, items, meta) {
  const card = el('div', { cls: 'card' });
  card.appendChild(makeHeader(meta, tag));
  card.appendChild(el('div', { cls: 'card-section-label', text: tag.toUpperCase() }));
  card.appendChild(el('div', { cls: 'card-section-title', text: title }));

  const body = el('div', { cls: 'card-body' });
  const list = el('div', { cls: 'list-items' });
  items.forEach(item => {
    const wrap = el('div', { cls: 'list-item' });
    if (item.label) wrap.appendChild(el('div', { cls: 'list-item-label', text: item.label }));
    wrap.appendChild(el('div', { cls: 'list-item-body', text: item.body }));
    list.appendChild(wrap);
  });
  body.appendChild(list);
  card.appendChild(body);
  card.appendChild(makeFooter());
  return card;
}

function notesCard(tag, title, groups, meta) {
  const card = el('div', { cls: 'card' });
  card.appendChild(makeHeader(meta, tag));
  card.appendChild(el('div', { cls: 'card-section-label', text: tag.toUpperCase() }));
  card.appendChild(el('div', { cls: 'card-section-title', text: title }));

  const body = el('div', { cls: 'card-body' });
  const groupWrap = el('div', { cls: 'notes-group' });
  groups.forEach(g => {
    const itemEl = el('div', { cls: 'notes-item' });
    if (g.label) itemEl.appendChild(el('div', { cls: 'notes-label', text: g.label }));
    g.body.forEach((b, i) => {
      itemEl.appendChild(el('div', { cls: 'notes-body' + (i > 0 ? ' sub' : ''), text: b }));
    });
    groupWrap.appendChild(itemEl);
  });
  body.appendChild(groupWrap);
  card.appendChild(body);
  card.appendChild(makeFooter());
  return card;
}

/* ============================================
   Orchestrator
   ============================================ */
function renderCards(data, meta) {
  const cards = [];

  const insight = data.summary.length > 0
    ? (data.summary[0].label ? data.summary[0].label + ' · ' : '') + data.summary[0].body
    : '주간 마케팅 리포트';
  cards.push(coverCard(meta, insight));

  if (data.uv) cards.push(metricCard('Users', '주간 유저 (UV)', data.uv, meta));
  if (data.sales) cards.push(metricCard('Sales', '주간 매출', data.sales, meta));
  if (data.topIPs.length > 0) cards.push(rankCard('Top IP', 'IP별 매출 점유율', data.topIPs, meta));
  if (data.topCountries.length > 0) cards.push(rankCard('Top Country', 'UV Top 국가', data.topCountries, meta));
  if (data.summary.length > 0) cards.push(summaryCard('Summary', '이번 주 요약', data.summary, meta));

  if (data.notes.length > 0) {
    const chunks = chunkArray(data.notes, 3);
    chunks.forEach((chunk, i) => {
      const title = chunks.length > 1 ? '마케팅 특이사항 (' + (i + 1) + '/' + chunks.length + ')' : '마케팅 특이사항';
      cards.push(notesCard('Notes', title, chunk, meta));
    });
  }

  cards.forEach((cardEl, idx) => {
    const footer = cardEl.querySelector('.card-footer');
    clearNode(footer);
    footer.appendChild(el('span', { cls: 'brand-mark', text: 'SQUARE · WEEKLY' }));
    footer.appendChild(el('span', { text: (idx + 1) + ' / ' + cards.length }));
  });

  return cards;
}

function chunkArray(arr, size) {
  const out = [];
  for (let i = 0; i < arr.length; i += size) out.push(arr.slice(i, i + size));
  return out;
}

/* ============================================
   App glue
   ============================================ */
const $ = (id) => document.getElementById(id);
let currentCards = [];

function generate() {
  const text = $('rawInput').value.trim();
  if (!text) { alert('텍스트를 붙여넣으세요'); return; }
  const data = parseReport(text);

  const dateStr = $('reportDate').value;
  let dateDisplay = '';
  if (dateStr) {
    const d = new Date(dateStr);
    dateDisplay = d.getFullYear() + '.' + String(d.getMonth() + 1).padStart(2, '0') + '.' + String(d.getDate()).padStart(2, '0');
  }
  const meta = { dateDisplay, week: $('reportWeek').value.trim() };

  const cards = renderCards(data, meta);
  currentCards = cards;

  const stack = $('cardsStack');
  clearNode(stack);
  cards.forEach((cardEl, idx) => {
    const wrap = el('div', { cls: 'card-wrap' });
    const metaRow = el('div', { cls: 'card-meta-row' });
    metaRow.appendChild(el('span', { cls: 'card-num', text: 'CARD ' + (idx + 1) }));
    metaRow.appendChild(document.createTextNode(' / ' + cards.length));
    metaRow.appendChild(el('button', {
      cls: 'btn',
      text: '⬇ PNG 저장',
      on: { click: () => downloadCard(cardEl, idx + 1) }
    }));
    wrap.appendChild(cardEl);
    wrap.appendChild(metaRow);
    stack.appendChild(wrap);
  });
}

async function downloadCard(cardEl, idx) {
  const canvas = await html2canvas(cardEl, { scale: 2, backgroundColor: '#ffffff', useCORS: true });
  const dateStr = $('reportDate').value || formatToday();
  const link = document.createElement('a');
  link.download = 'mkt-card-' + dateStr + '-' + String(idx).padStart(2, '0') + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

async function downloadAll() {
  if (currentCards.length === 0) { alert('먼저 카드를 생성하세요'); return; }
  for (let i = 0; i < currentCards.length; i++) {
    await downloadCard(currentCards[i], i + 1);
    await new Promise(r => setTimeout(r, 200));
  }
}

function formatToday() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function loadSample() {
  $('rawInput').value = SAMPLE;
  if (!$('reportDate').value) $('reportDate').value = '2026-05-18';
  if (!$('reportWeek').value) $('reportWeek').value = 'WEEK 20';
  generate();
}

function showEmpty() {
  const stack = $('cardsStack');
  clearNode(stack);
  const empty = el('div', { cls: 'empty' });
  empty.appendChild(el('strong', { text: '아직 카드가 없습니다' }));
  empty.appendChild(document.createTextNode('왼쪽에 Weekly MKT Report 텍스트를 붙여넣고 "카드 생성"을 누르세요.'));
  empty.appendChild(el('br'));
  empty.appendChild(document.createTextNode('또는 상단 "샘플 불러오기"로 시작.'));
  stack.appendChild(empty);
}

$('generate').addEventListener('click', generate);
$('downloadAll').addEventListener('click', downloadAll);
$('loadSample').addEventListener('click', loadSample);
$('reportDate').value = formatToday();
showEmpty();
</script>
