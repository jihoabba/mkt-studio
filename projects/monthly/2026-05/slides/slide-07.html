<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Slide 07 — Section Divider</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 720pt; height: 405pt;
    font-family: 'Pretendard Variable', Pretendard, -apple-system, sans-serif;
    background: #191F28;
    color: #FFFFFF;
    overflow: hidden;
    letter-spacing: -0.01em;
  }
  .slide { width: 100%; height: 100%; padding: 64px; display: flex; flex-direction: column; justify-content: center; }
  .chapter { font-size: 13px; font-weight: 700; color: #6AA9FF; letter-spacing: 2px; margin-bottom: 20px; }
  h2 { font-size: 64px; font-weight: 900; line-height: 1.05; letter-spacing: -2px; margin: 0; }
  h2 .blue { color: #3182F6; }
  .divider { width: 56px; height: 4px; background: #3182F6; margin-top: 28px; }
  .sub { margin-top: 28px; font-size: 17px; color: #D1D6DB; max-width: 480px; line-height: 1.6; font-weight: 500; }
  .footer { position: absolute; bottom: 28px; left: 64px; right: 64px; display: flex; justify-content: space-between; font-size: 11px; color: #8B95A1; font-weight: 600; }
</style>
</head>
<body>
<div class="slide">
  <div class="chapter">CHAPTER 02</div>
  <h2><span class="blue">대응</span> 전략</h2>
  <div class="divider"></div>
  <p class="sub">4가지 옵션을 평가하고, 즉시·중기·장기로 분리해 실행 가능한 추천 조합을 제시합니다.</p>
</div>
<div class="footer">
  <span>4월 이후 광고 효율 하락 — 진단과 대응</span>
  <span>07 / 11</span>
</div>
</body>
</html>
