<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Slide 01 — Cover</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 720pt; height: 405pt;
    font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, sans-serif;
    background: #191F28;
    color: #FFFFFF;
    overflow: hidden;
    letter-spacing: -0.01em;
  }
  .slide { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; padding: 48px; }
  .inner { max-width: 880px; width: 100%; text-align: center; }
  .label { font-size: 12px; font-weight: 700; color: #3182F6; letter-spacing: 2px; margin-bottom: 18px; }
  h1 { font-size: 52px; font-weight: 900; line-height: 1.18; letter-spacing: -1.5px; margin: 0; }
  h1 .blue { color: #3182F6; }
  .sub { font-size: 20px; color: #D1D6DB; margin-top: 22px; font-weight: 500; letter-spacing: -0.5px; }
  .meta { position: absolute; bottom: 28px; left: 48px; right: 48px; display: flex; justify-content: space-between; font-size: 11px; color: #8B95A1; letter-spacing: 1px; font-weight: 600; }
</style>
</head>
<body>
<div class="slide">
  <div class="inner">
    <p class="label">— 보완 자료 · 2026.05 MONTHLY</p>
    <h1>4월 이후 광고 효율 하락,<br><span class="blue">진단</span>과 <span class="blue">대응</span></h1>
    <p class="sub">광고 운영 문제가 아닌, 구조적 신호</p>
  </div>
</div>
<div class="meta">
  <span>YTD 광고 성과 보고 보완 · ement 리포트 기반</span>
  <span>LINE FRIENDS SQUARE</span>
</div>
</body>
</html>
