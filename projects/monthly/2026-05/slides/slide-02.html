<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Slide 02 — Contents</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 720pt; height: 405pt;
    font-family: 'Pretendard Variable', Pretendard, -apple-system, sans-serif;
    background: #FFFFFF;
    color: #191F28;
    overflow: hidden;
    letter-spacing: -0.01em;
  }
  .slide { width: 100%; height: 100%; padding: 56px 64px; display: flex; flex-direction: column; }
  .header { margin-bottom: 32px; }
  .label { font-size: 13px; font-weight: 700; color: #3182F6; letter-spacing: 1px; margin-bottom: 8px; }
  h2 { font-size: 30px; font-weight: 800; color: #191F28; letter-spacing: -0.5px; margin: 0; }
  .grid { flex: 1; display: grid; grid-template-columns: 1fr 1fr; column-gap: 16px; row-gap: 12px; align-content: center; }
  .item { background: #F9FAFB; border: 1px solid #F2F4F6; border-radius: 12px; padding: 18px 20px; display: flex; align-items: center; gap: 16px; }
  .item-num { font-size: 14px; font-weight: 800; color: #3182F6; background: #EBF4FF; border-radius: 8px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .item-text { font-size: 15px; font-weight: 700; color: #191F28; }
  .footer { margin-top: 20px; display: flex; justify-content: space-between; font-size: 11px; color: #8B95A1; letter-spacing: 0.5px; font-weight: 600; }
</style>
</head>
<body>
<div class="slide">
  <header class="header">
    <div class="label">CONTENTS</div>
    <h2>오늘 다룰 5가지</h2>
  </header>
  <div class="grid">
    <div class="item"><div class="item-num">01</div><div class="item-text">현황 — 표면 신호</div></div>
    <div class="item"><div class="item-num">02</div><div class="item-text">진단 — 광고 문제가 아니다</div></div>
    <div class="item"><div class="item-num">03</div><div class="item-text">구조적 원인 — 4단계 흐름</div></div>
    <div class="item"><div class="item-num">04</div><div class="item-text">대응 전략 — 4가지 옵션</div></div>
    <div class="item"><div class="item-num">05</div><div class="item-text">추천 조합과 액션</div></div>
  </div>
  <div class="footer"><span>4월 이후 광고 효율 하락 — 진단과 대응</span><span>02 / 11</span></div>
</div>
</body>
</html>
